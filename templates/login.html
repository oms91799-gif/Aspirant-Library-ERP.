<!DOCTYPE html>
<html>
<head>
    <title>Aspirant Library - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #121212; color: white; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .login-card { background: #1e1e1e; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 100%; max-width: 400px; }
        .btn-primary { background: #6200ee; border: none; }
    </style>
</head>
<body>
    <div class="login-card text-center">
        <h2 class="mb-4">Aspirant Library</h2>
        <form action="/login" method="POST">
            <input type="text" name="username" class="form-control mb-3 bg-dark text-white border-secondary" placeholder="ID (Admin or ASP...)">
            <input type="password" name="password" class="form-control mb-4 bg-dark text-white border-secondary" placeholder="Password">
            <button class="btn btn-primary w-100 py-2">Login to ERP</button>
        </form>
    </div>
</body>
</html>
