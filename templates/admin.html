<!DOCTYPE html>
<html>
<head>
    <title>Owner Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #121212; color: #e0e0e0; }
        .card { background: #1e1e1e; border: none; color: white; margin-bottom: 20px; }
        .table { color: #e0e0e0; }
    </style>
</head>
<body class="container mt-4">
    <div class="d-flex justify-content-between">
        <h2>Admin Panel - Aspirant Library</h2>
        <a href="/logout" class="btn btn-outline-danger">Logout</a>
    </div>
    <hr>
    
    <div class="card p-4">
        <h5>New Student Registration</h5>
        <form action="/add_student" method="POST" class="row g-3">
            <div class="col-md-5"><input type="text" name="name" class="form-control" placeholder="Student Name" required></div>
            <div class="col-md-3"><input type="text" name="seat" class="form-control" placeholder="Seat No" required></div>
            <div class="col-md-4"><button class="btn btn-success w-100">Add & Generate ID</button></div>
        </form>
    </div>

    <div class="card p-4">
        <h5>Manage Students & Dues</h5>
        <table class="table">
            <thead><tr><th>ID</th><th>Name</th><th>Seat</th><th>Dues</th><th>Action</th></tr></thead>
            <tbody>
                {% for s in students %}
                <tr>
                    <td>{{ s.student_id }}</td>
                    <td>{{ s.name }}</td>
                    <td>{{ s.seat_number }}</td>
                    <td class="text-danger">₹{{ s.dues }}</td>
                    <td>
                        <form action="/pay/{{ s.id }}" method="POST" class="d-flex gap-1">
                            <input type="number" name="amount" class="form-control form-control-sm" style="width: 80px;">
                            <button class="btn btn-sm btn-warning">Pay</button>
                        </form>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
