<!DOCTYPE html>
<html>
<head>
    <title>Aspirant Library ERP</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
    <h2 class="text-center">Aspirant Library - Seat & Fees Management</h2>
    <hr>
    
    <div class="card p-4 mb-4">
        <h4>New Admission / Seat Allotment</h4>
        <form action="/add" method="POST" class="row g-3">
            <div class="col-md-5">
                <input type="text" name="name" class="form-control" placeholder="Student Name" required>
            </div>
            <div class="col-md-3">
                <input type="text" name="seat" class="form-control" placeholder="Seat No (e.g. A1)" required>
            </div>
            <div class="col-md-4">
                <button type="submit" class="btn btn-primary w-100">Allot Seat</button>
            </div>
        </form>
    </div>

    <h4>Current Students & Dues</h4>
    <table class="table table-bordered">
        <thead class="table-dark">
            <tr>
                <th>Seat</th>
                <th>Name</th>
                <th>Monthly Fees</th>
                <th>Paid</th>
                <th>Dues</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
            {% for s in students %}
            <tr>
                <td>{{ s.seat_number }}</td>
                <td>{{ s.name }}</td>
                <td>₹{{ s.monthly_fees }}</td>
                <td>₹{{ s.total_paid }}</td>
                <td class="{{ 'text-danger fw-bold' if s.dues > 0 else 'text-success' }}">
                    ₹{{ s.dues }}
                </td>
                <td>
                    <button class="btn btn-sm btn-success">Download Slip</button>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
