<!DOCTYPE html>
<html>
<head>
    <title>My Ledger | Aspirant Library</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #0f172a; color: white; }
        .ledger-card { background: #1e293b; border-radius: 20px; padding: 40px; margin-top: 50px; border: 1px solid #334155; }
    </style>
</head>
<body class="container">
    <div class="ledger-card shadow-lg">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Welcome, {{ student.name }}</h2>
            <a href="/logout" class="btn btn-outline-light btn-sm">Logout</a>
        </div>
        <div class="row text-center mb-4">
            <div class="col-6 bg-dark p-3 rounded">Total Paid: <span class="text-success fw-bold">₹{{ student.total_paid }}</span></div>
            <div class="col-6 bg-dark p-3 rounded">Pending: <span class="text-danger fw-bold">₹{{ student.dues }}</span></div>
        </div>
        <h5>Payment History</h5>
        <table class="table table-dark table-hover">
            <thead><tr><th>Date</th><th>Amount</th><th>Receipt</th></tr></thead>
            <tbody>
                {% for p in student.payments %}
                <tr>
                    <td>{{ p.date.strftime('%d %b %Y') }}</td>
                    <td class="text-success">₹{{ p.amount }}</td>
                    <td><a href="/receipt/{{ p.id }}" class="btn btn-sm btn-info">Download Slip</a></td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
